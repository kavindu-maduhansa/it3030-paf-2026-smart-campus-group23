# Development Profile
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
logging.level.com.smartcampus=DEBUG

# HikariCP Connection Pool - Minimize connections for shared FreeSQLDatabase
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.auto-commit=true
# Do not validate pool at startup - avoids using an isolated connection for health check
spring.datasource.hikari.initialization-fail-timeout=-1

# Hibernate Configuration - Avoid dialect detection query (needs explicit dialect to skip metadata fetch)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=0
spring.jpa.properties.hibernate.order_inserts=false
spring.jpa.properties.hibernate.order_updates=false

# Fail-safe connection handling
spring.datasource.hikari.allow-pool-suspension=true
spring.datasource.hikari.leak-detection-threshold=60000

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# Frontend Configuration
app.frontend-url=http://localhost:5174
